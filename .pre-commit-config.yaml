repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.16
  hooks:
    # Run the linter.
    - id: ruff-check
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
- repo: local # From https://github.com/astral-sh/ty/issues/269
  hooks:
    - id: ty
      name: ty check
      entry: uv run ty check .
      language: system
      pass_filenames: false